<section id="tab-campanha" class="tabs">
      <div class="grid two">
        <div class="panel">
          <div class="section-title"><h3>Arquivo da campanha</h3></div>
          <div class="grid">
            <div><label>Nome da campanha</label><input id="campaign-name"></div>
            <div><label>Premissa</label><textarea id="campaign-premise"></textarea></div>
            <div class="field-row">
              <div><label>Sessão atual</label><input id="campaign-session"></div>
              <div><label>Local atual</label><input id="campaign-location"></div>
            </div>
            <div><label>Segredos do mestre</label><textarea id="campaign-secrets"></textarea></div>
          </div>
        </div>
        <div class="panel">
          <div class="section-title">
            <h3>Personagens vinculados</h3>
            <button class="btn small" onclick="addAllCharactersToCampaign()">Adicionar todas</button>
          </div>
          <div id="party-list" class="list"></div>
        </div>
      </div>
      <div class="grid two" style="margin-top:14px">
        <div class="panel">
          <div class="section-title">
            <h3>Registro de sessão</h3>
            <button class="btn small primary" onclick="addNote()">Nova nota</button>
          </div>
          <div class="filterbar two">
            <input id="note-search" aria-label="Pesquisar notas" placeholder="Pesquisar notas" oninput="setFilter('notes','search',this.value)">
            <input id="note-tag-filter" aria-label="Filtrar notas por etiqueta" placeholder="Etiqueta" oninput="setFilter('notes','tag',this.value)">
          </div>
          <div id="note-list" class="list"></div>
        </div>
        <div class="panel">
          <div class="section-title"><h3>Resumo rápido</h3></div>
          <div class="grid three" id="campaign-metrics"></div>
        </div>
      </div>
    </section>

<section id="tab-mapas" class="tabs">
      <div class="map-wrap">
        <div class="panel">
          <div class="section-title"><h3>Editor tático</h3></div>
          <div class="field-row">
            <div><label>Nome do mapa</label><input id="map-name" placeholder="ex: Cripta da Fissura"></div>
            <div><label>Largura</label><input id="map-width" type="number" min="8" max="40"></div>
            <div><label>Altura</label><input id="map-height" type="number" min="8" max="32"></div>
          </div>
          <div class="row" style="margin:10px 0">
            <button class="btn small primary" onclick="resizeMap()">Aplicar</button>
            <button class="btn small primary" onclick="saveCurrentMap()">Salvar mapa</button>
            <button class="btn small primary" onclick="randomDungeon()">Mapa aleatório</button>
            <button class="btn small" onclick="clearMap()">Limpar mapa</button>
          </div>
          <div class="section-title" style="margin-top:14px"><h3>Banco de mapas</h3></div>
          <div id="saved-map-list" class="list"></div>
          <div style="margin-top:14px">
            <label>Criatura do token</label>
            <select id="map-creature-select" onchange="selectMapCreature(this.value)"></select>
          </div>
          <div class="tool-grid" id="map-tools"></div>
          <div class="section-title" style="margin-top:14px"><h3>Visibilidade</h3></div>
          <div id="map-privacy" class="map-privacy"></div>
          <div class="section-title" style="margin-top:14px"><h3>Legenda</h3></div>
          <div id="map-legend" class="map-legend"></div>
          <p class="muted">Clique no grid para pintar terreno, portas, perigos e tokens. Use visibilidade para ocultar áreas e revelar o mapa conforme o grupo avança.</p>
        </div>
        <div class="map-stage">
          <div id="map-grid" class="map-grid"></div>
        </div>
      </div>
    </section>

        <div class="panel">
          <div class="section-title"><h3>Rolagem livre</h3></div>
          <div class="grid four">
            <button class="btn" onclick="rollDice('1d4')">d4</button>
            <button class="btn" onclick="rollDice('1d6')">d6</button>
            <button class="btn" onclick="rollDice('1d8')">d8</button>
            <button class="btn" onclick="rollDice('1d10')">d10</button>
            <button class="btn" onclick="rollDice('1d12')">d12</button>

          </div>
        </div>
        <div class="panel">
          <div class="section-title">

        </div>
      </div>

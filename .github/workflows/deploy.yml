name: Publicar aplicação

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint -- --max-warnings=0
      - run: npm run build
      - run: node tools/publish_download_site.cjs
      - run: node tools/apply_bestiary_ai_images.cjs
      - run: node tools/enrich_bestiary_special_abilities.cjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
